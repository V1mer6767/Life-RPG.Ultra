<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life RPG 10.0 ULTRA</title>

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#020617; color:white; }
.container { padding:15px; padding-bottom:100px; }
.card { background:#0f172a; border-radius:15px; padding:15px; margin-bottom:15px; }
button { width:100%; padding:12px; border-radius:12px; border:none; background:#22c55e; color:white; margin-top:6px; font-size:15px; }
input { width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:10px; }
.progress { height:10px; background:#1e293b; border-radius:10px; }
.progress-bar { height:10px; background:#22c55e; border-radius:10px; }

.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0f172a;
  border-top:1px solid #1e293b;
}

.navbar button {
  flex:1;
  padding:14px 0;
  font-size:18px;
}

.hidden { display:none; }
.badge { font-size:12px; opacity:.7; }

</style>
</head>
<body>

<div class="container">

<div id="home">
  <div class="card">
    <h3>Level: <span id="level"></span></h3>
    <div class="progress"><div id="bar" class="progress-bar"></div></div>
    <p>XP: <span id="xp"></span></p>
    <p>Coins: <span id="coins"></span></p>
    <p>🔥 Streak: <span id="streak"></span></p>
  </div>
</div>

<div id="habits" class="hidden">
  <div class="card">
    <h3>Звички</h3>
    <input id="habitInput" placeholder="Нова звичка">
    <button onclick="addHabit()">Додати</button>
    <ul id="habitList"></ul>
  </div>
</div>

<div id="missions" class="hidden">
  <div class="card">
    <h3>Щоденні місії</h3>
    <p class="badge">Оновлюються раз на день</p>
    <div id="dailyList"></div>
  </div>
</div>

<div id="shop" class="hidden">
  <div class="card">
    <h3>Магазин</h3>
    <button onclick="buy('Телефон',100)">📱 Телефон - 100</button>
    <button onclick="buy('Ноутбук',500)">💻 Ноутбук - 500</button>
    <button onclick="buy('Машина',2000)">🚗 Машина - 2000</button>
    <button onclick="buy('Будинок',5000)">🏠 Будинок - 5000</button>
    <button onclick="buy('Вілла',10000)">🏝 Вілла - 10000</button>
  </div>
</div>

<div id="inventory" class="hidden">
  <div class="card">
    <h3>Інвентар</h3>
    <ul id="invList"></ul>
  </div>
</div>

</div>

<div class="navbar">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('habits')">✅</button>
  <button onclick="show('missions')">🎯</button>
  <button onclick="show('shop')">🛒</button>
  <button onclick="show('inventory')">🎒</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('lifeRPG')) || {
  xp:0, level:1, coins:0, habits:[], streak:0, lastDay:null, inventory:[], dailies:[], dailyDate:null
};

const missionsPool = [
  {name:'Навчання', xp:30, coins:20},
  {name:'Робота', xp:20, coins:40},
  {name:'Зал', xp:40, coins:15},
  {name:'Читання', xp:25, coins:20},
  {name:'Саморозвиток', xp:35, coins:25}
];

function save(){ localStorage.setItem('lifeRPG', JSON.stringify(data)); }
function today(){ return new Date().toDateString(); }

function generateDailies(){
  if(data.dailyDate !== today()){
    data.dailies = [];
    for(let i=0;i<3;i++){
      let m = missionsPool[Math.floor(Math.random()*missionsPool.length)];
      data.dailies.push({...m, done:false});
    }
    data.dailyDate = today();
  }
}

function addStreak(){
  if(data.lastDay !== today()){
    data.streak++;
    data.lastDay = today();
  }
}

function render(){
  level.innerText = data.level;
  xp.innerText = data.xp;
  coins.innerText = data.coins;
  streak.innerText = data.streak;
  bar.style.width = (data.xp/(data.level*100))*100 + '%';

  habitList.innerHTML='';
  data.habits.forEach((h,i)=>{
    habitList.innerHTML += `<li>${h} <button onclick="done(${i})">✔</button></li>`;
  });

  invList.innerHTML='';
  data.inventory.forEach(i=>{
    invList.innerHTML += `<li>${i}</li>`;
  });

  const dl = document.getElementById('dailyList');
  dl.innerHTML='';
  data.dailies.forEach((m,i)=>{
    dl.innerHTML += `<button onclick="doDaily(${i})" ${m.done?'disabled':''}>
      ${m.name} (+${m.xp} XP, +${m.coins}) ${m.done?'✅':''}
    </button>`;
  });
}

function doDaily(i){
  let m = data.dailies[i];
  if(m.done) return;

  data.xp += m.xp;
  data.coins += m.coins;
  m.done = true;
  addStreak();

  if(data.xp >= data.level*100){ data.xp=0; data.level++; }

  save(); render();
}

function addHabit(){
  if(!habitInput.value) return;
  data.habits.push(habitInput.value);
  habitInput.value='';
  save(); render();
}

function done(i){
  data.xp += 20;
  data.coins += 15;
  addStreak();

  if(data.xp >= data.level*100){ data.xp=0; data.level++; }

  save(); render();
}

function buy(name,cost){
  if(data.coins>=cost){
    data.coins-=cost;
    data.inventory.push(name);
    alert('Куплено: '+name);
  } else alert('Недостатньо грошей');
  save(); render();
}

function show(tab){
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
}

generateDailies();
render();
</script>

</body>
</html>
